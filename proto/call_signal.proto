syntax = "proto3";

package flare.common.v1;

// =============================================================================
// 通话信令（Call Signal）- 与 EVENT_CALL_SIGNAL + transport DATA 通道配合，适配 WebRTC
// =============================================================================
// 两条路径（同一 call_id 关联）：
// 1) 事件通道：Event.payload.call_signal（CallSignalEvent），会话内有序，适合 invite/accept/reject/hangup 及小 payload。
// 2) DATA 通道：自定义载荷（common/transport_data.proto），不占 seq，适合大包 SDP/ICE。
// 业务层按 call_id 将两条路径的信令合并为同一通话。

// -----------------------------------------------------------------------------
// 信令类型（CallSignalEvent.signal_type 取值）
// -----------------------------------------------------------------------------

enum CallSignalType {
  CALL_SIGNAL_TYPE_UNSPECIFIED = 0;
  CALL_SIGNAL_TYPE_INVITE = 1;    // 邀请
  CALL_SIGNAL_TYPE_ACCEPT = 2;    // 接听
  CALL_SIGNAL_TYPE_REJECT = 3;    // 拒绝
  CALL_SIGNAL_TYPE_HANGUP = 4;    // 挂断
  CALL_SIGNAL_TYPE_CANDIDATE = 5; // ICE candidate（小 payload 时可走事件；大包建议走 DATA 通道）
}

// -----------------------------------------------------------------------------
// 事件通道：EVENT_CALL_SIGNAL 载荷
// -----------------------------------------------------------------------------

/// 通话信令事件（EVENT_CALL_SIGNAL）：invite/accept/reject/hangup/candidate 等
message CallSignalEvent {
  string call_id = 1;              // 唯一通话 ID，与 DATA 通道 Webrtc* 的 call_id 一致
  string signal_type = 2;          // 取值见 CallSignalType 或扩展（invite/accept/reject/hangup/candidate）
  bytes payload = 3;               // 原始信令（小 SDP/ICE 等）；大包建议走 DATA 通道
  map<string, string> metadata = 4; // 扩展，如 media_type=audio/video
}

// -----------------------------------------------------------------------------
// DATA 通道：SDP / ICE 可经 transport_data 自定义载荷下发
// -----------------------------------------------------------------------------
// 不占会话 seq，适合大体积 SDP、频繁 ICE candidate；与 CallSignalEvent 共用 call_id。

/// WebRTC SDP Offer（DATA 通道）
message WebrtcSdpOffer {
  string call_id = 1;    // 与 CallSignalEvent.call_id 一致
  string sdp = 2;        // SDP 字符串（type=offer）
  map<string, string> metadata = 3;
  reserved 4 to 9;
}

/// WebRTC SDP Answer（DATA 通道）
message WebrtcSdpAnswer {
  string call_id = 1;
  string sdp = 2;        // SDP 字符串（type=answer）
  map<string, string> metadata = 3;
  reserved 4 to 9;
}

/// WebRTC ICE Candidate（DATA 通道）
message WebrtcIceCandidate {
  string call_id = 1;
  string candidate = 2;       // ICE candidate 字符串
  string sdp_mid = 3;         // sdpMid
  int32 sdp_mline_index = 4; // sdpMLineIndex
  map<string, string> metadata = 5;
  reserved 6 to 9;
}

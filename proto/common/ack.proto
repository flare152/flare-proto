syntax = "proto3";

package flare.common.v1;

// Connection/Push BC：传输层 ACK 与错误（SendAck/SendEnvelopeAck/OperationAck/PushAck/ErrorPacket）。

enum AckStatus {
  ACK_STATUS_UNSPECIFIED = 0;
  ACK_STATUS_SUCCESS = 1;
  ACK_STATUS_FAILED = 2;
}

message PushAck {
  string window_id = 1;   // 与 EventEnvelope.window_id 对应
  uint64 ack_seq = 2;     // 已处理到的最大 seq
}

message SendAck {
  string client_msg_id = 1;
  string server_msg_id = 2;
  uint64 seq = 3;
  bool success = 4;
  int32 error_code = 5;
  string error_message = 6;
}

// 与 SendAck 同构，用于推送/网关层回执（字段语义一致）
message SendEnvelopeAck {
  string server_msg_id = 1;
  AckStatus status = 2;
  uint64 seq = 3;
  int32 error_code = 4;
  string error_message = 5;
}

message OperationAck {
  bool success = 1;
  int32 error_code = 2;
  string error_message = 3;
  string request_id = 4;   // 与 Event.request_id 对应
}

message ErrorPacket {
  int32 code = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

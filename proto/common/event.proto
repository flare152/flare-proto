syntax = "proto3";

package flare.common.v1;

import "google/protobuf/timestamp.proto";
import "common/enums.proto";
import "common/message.proto";

// =============================================================================
// 领域事件（Message/Session BC）- 单一 Command 路径
// =============================================================================
// 所有消息/会话侧“操作”均编码为 Event(type + payload)，服务端写事件流并回 OperationAck。
// 顺序：会话内 seq 主序；event_seq 可选（每用户全局序）。tenant_id/operator_id/request_id 可由 metadata 注入。

// -----------------------------------------------------------------------------
// 事件批
// -----------------------------------------------------------------------------
message EventEnvelope {
  repeated Event events = 1;      // 本批事件
  uint64 max_seq = 2;             // 本批最大 seq（会话内）
  bool has_more = 3;              // 是否还有更多
  string next_cursor = 4;         // 分页游标
  string window_id = 5;           // 推送窗口 ID，用于 PushAck
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_MESSAGE = 1;              // 新消息
  EVENT_MESSAGE_RECALL = 2;       // 撤回
  EVENT_MESSAGE_EDIT = 3;         // 编辑
  EVENT_MESSAGE_DELETE = 4;       // 删除
  EVENT_READ_RECEIPT = 5;         // 已读
  EVENT_TYPING = 6;               // 输入状态
  EVENT_CONVERSATION_UPDATE = 7;  // 会话更新
  EVENT_CONVERSATION_DELETE = 8;  // 会话删除
  EVENT_PRESENCE = 9;             // 在线状态
  EVENT_CALL_SIGNAL = 10;         // 通话信令
  EVENT_REACTION = 11;            // 反应增/删
  EVENT_PIN = 12;                 // 置顶
  EVENT_UNPIN = 13;               // 取消置顶
  EVENT_MARK = 14;                // 标记
  EVENT_UNMARK = 15;              // 取消标记
  EVENT_CUSTOM = 99;              // 扩展
}


// -----------------------------------------------------------------------------
// 领域事件（上行操作与下行推送均用本结构；与 message.proto 操作 RPC 对齐，可统一走 ExecuteEvent）
// -----------------------------------------------------------------------------
// 上行时 tenant_id、operator_id、request_id 可由 gRPC metadata 注入，本结构可省略；长连接上行需填。
message Event {
  string tenant_id = 1;           // 上行可空，由 metadata 注入
  string conversation_id = 2;    // 会话 ID，非会话事件可空
  uint64 seq = 3;                // 会话内递增，主序；上行可为 0
  EventType type = 4;
  google.protobuf.Timestamp created_at = 5;  // 下行回填
  string operator_id = 6;         // 操作者，上行可空由 metadata 注入
  optional uint64 event_seq = 7;  // 每用户全局序，全量同步用
  optional string request_id = 8; // 上行设，与 OperationAck 关联；可空由 metadata 注入

  oneof payload {
    Message message = 10;        
    MessageRecallEvent recall = 11;
    MessageEditEvent edit = 12;
    MessageDeleteEvent delete = 13;
    ReadReceiptEvent read = 14;
    TypingEvent typing = 15;
    ConversationUpdateEvent conversation = 16;
    ConversationDeleteEvent conversation_delete = 17;
    PresenceEvent presence = 18;
    CallSignalEvent call_signal = 19;
    ReactionEvent reaction = 20;
    PinEvent pin = 21;
    UnpinEvent unpin = 22;
    MarkEvent mark = 23;
    UnmarkEvent unmark = 24;
    CustomEvent custom = 50;
  }
}

message MessageRecallEvent {
  string server_msg_id = 1;      // 目标消息（上行必填；下行回填）
  string reason = 2;
  optional int32 time_limit_seconds = 3;  // 上行：可撤回时间窗
  optional bool allow_admin_recall = 4;   // 上行：是否允许管理员代撤
}

message MessageEditEvent {
  string server_msg_id = 1;       // 目标消息
  bytes new_content = 2;          // 序列化 MessageContent
  int32 edit_version = 3;         // 编辑版本，递增
  string reason = 4;
  bool show_edited_mark = 5;      // 是否显示「已编辑」
}

message MessageDeleteEvent {
  string server_msg_id = 1;
  optional flare.common.v1.DeleteType delete_type = 2;   // 上行：软删/硬删
  optional string reason = 3;
  optional bool notify_others = 4;
}

message ConversationUpdateEvent {
  string conversation_id = 1;
  string title = 2;               // 会话标题
  string avatar = 3;              // 头像
  int32 unread_count = 4;         // 未读数
}

message ConversationDeleteEvent {
  string conversation_id = 1;     // 被删会话
}

message ReadReceiptEvent {
  string conversation_id = 1;
  uint64 read_seq = 2;            // 下行：已读到该 seq
  string user_id = 3;             // 已读用户
  repeated string message_ids = 4; // 上行：批量已读消息 ID；下行：已读列表
  optional google.protobuf.Timestamp read_at = 5;  // 上行：已读时间
  optional bool burn_after_read = 6;                // 上行：阅后即焚
}

message TypingEvent {
  string conversation_id = 1;
  string user_id = 2;             // 正在输入的用户
  bool typing = 3;                // true=输入中，false=停止
}

message PresenceEvent {
  string user_id = 1;
  string status = 2;              // online / offline / away 等
  map<string, string> extra = 3;  // 扩展
}

message CallSignalEvent {
  string call_id = 1;             // 通话 ID
  string signal_type = 2;         // invite / accept / reject / hangup 等
  bytes payload = 3;
  map<string, string> metadata = 4;
}

message CustomEvent {
  string namespace = 1;           // org.xxx / bot / app
  string name = 2;
  string version = 3;
  bytes payload = 4;
  map<string, string> metadata = 5;
}

message ReactionEvent {
  string server_msg_id = 1;       // 目标消息
  string user_id = 2;             // 操作用户
  string emoji = 3;               // 如 👍
  flare.common.v1.ReactionAction action = 4;  // 添加/移除
}

message PinEvent {
  string server_msg_id = 1;       // 目标消息
  string pinned_by = 2;           // 置顶操作者，下行回填
  optional string reason = 3;     // 上行：置顶说明
  optional google.protobuf.Timestamp expire_at = 4;  // 置顶到期
}

message UnpinEvent {
  string server_msg_id = 1;       // 目标消息
}

message MarkEvent {
  string server_msg_id = 1;       // 目标消息
  string user_id = 2;             // 操作用户
  flare.common.v1.MarkType mark_type = 3;  // 重要/待办/已处理/自定义
  string color = 4;               // 标记颜色，可选
}

message UnmarkEvent {
  string server_msg_id = 1;       // 目标消息
  string user_id = 2;
  flare.common.v1.MarkType mark_type = 3;  // 要取消的标记类型；空=取消该消息全部标记
}

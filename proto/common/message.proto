syntax = "proto3";

package flare.common.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";
import "common/metadata.proto";
import "common/message_content.proto";
import "common/message_extended.proto";

// =============================================================================
// Message 聚合根（Message BC）- DDD + CQRS
// =============================================================================
// 事件流 + 旁路表存储。Message 为写模型聚合根与同步/列表展示的最小视图。
// 身份：(conversation_id, seq) 会话内全序；server_id 全局唯一。
// FSM: CREATED→SENT→DELIVERED→READ | RECALLED | DELETED_SOFT | DELETED_HARD（见 MessageStatus）。
// 时间线/已读/编辑历史/反应/可见性 存旁路表，按需 Query（见 message_extended）。
// 上行：ClientPacket.send_message(Message) 或 SendMessage RPC，仅填可写字段；服务端回填 server_id/seq/created_at/status。

enum MessageStatus {
  MESSAGE_STATUS_UNSPECIFIED = 0;
  MESSAGE_STATUS_CREATED = 1;   // 已创建
  MESSAGE_STATUS_SENT = 2;     // 已发送（正常态，可编辑）
  MESSAGE_STATUS_DELIVERED = 3;// 已送达
  MESSAGE_STATUS_READ = 4;     // 已读
  MESSAGE_STATUS_FAILED = 5;   // 发送失败
  MESSAGE_STATUS_RECALLED = 6; // 已撤回（终态）
  MESSAGE_STATUS_DELETED_HARD = 7;  // 硬删除（终态，仅管理员）
  MESSAGE_STATUS_DELETED_SOFT = 8;   // 软删除（用户维度，可恢复）
}

enum MessageSource {
  MESSAGE_SOURCE_UNSPECIFIED = 0;
  MESSAGE_SOURCE_USER = 1;     // 用户消息
  MESSAGE_SOURCE_SYSTEM = 2;   // 系统消息
  MESSAGE_SOURCE_BOT = 3;      // 机器人消息
  MESSAGE_SOURCE_ADMIN = 4;    // 管理员消息
}

enum ContentType {
  CONTENT_TYPE_UNSPECIFIED = 0;
  CONTENT_TYPE_PLAIN_TEXT = 1; // 纯文本
  CONTENT_TYPE_MARKDOWN = 2;   // Markdown
  CONTENT_TYPE_HTML = 3;       // HTML
  CONTENT_TYPE_JSON = 4;       // JSON
}

enum VisibilityStatus {
  VISIBILITY_VISIBLE = 0;  // 可见
  VISIBILITY_HIDDEN = 1;    // 隐藏（软删除）
  VISIBILITY_DELETED = 2;   // 已删除
}

enum ConversationType {
  CONVERSATION_TYPE_UNSPECIFIED = 0;
  CONVERSATION_TYPE_SINGLE = 1;  // 单聊
  CONVERSATION_TYPE_GROUP = 2;   // 群聊
  CONVERSATION_TYPE_CHANNEL = 3; // 频道
}

message Message {
  // 身份与顺序（同步锚点）
  string server_id = 1;           // 服务端消息ID（全局唯一）
  string conversation_id = 2;     // 会话ID
  string client_msg_id = 3;       // 客户端消息ID（去重/幂等）
  uint64 seq = 6;                 // 会话内递增序号
  google.protobuf.Timestamp created_at = 7; // 消息创建时间（唯一业务时间，与 DB created_at 一致）
  string sender_id = 4;           // 发送者ID
  string receiver_id = 11;        // 接收者ID（单聊必填，群聊为空）
  MessageSource source = 5;       // 消息来源
  ConversationType conversation_type = 8;
  MessageType message_type = 9;
  string business_type = 10;      // 业务类型（扩展）

  // 内容与引用
  MessageContent content = 20;
  ContentType content_type = 21;  // 文本格式：纯文本/Markdown/HTML
  repeated MediaAttachment attachments = 22;
  QuoteContent quote = 26;        // 引用/回复关系
  map<string, string> attributes = 24; // 业务扩展（如 thread_id）
  map<string, string> extra = 23; // 系统扩展

  // 状态（FSM）
  MessageStatus status = 30;
  optional google.protobuf.Timestamp recalled_at = 32;  // 仅 status=RECALLED 时设，省编码
  optional string recall_reason = 33;
  bool is_burn_after_read = 34;   // 是否阅后即焚
  int32 burn_after_seconds = 35;  // 阅后即焚秒数（0 表示未设）

  // 仅保留「已编辑」展示所需，完整编辑历史按需拉取（GetMessageEditHistory）
  optional int32 current_edit_version = 41;  // 0=未编辑，>0 表示已编辑版本
  optional google.protobuf.Timestamp last_edited_at = 42;

  optional AuditContext audit = 51;   // 审计（按需）
  repeated string tags = 60;           // 标签（分类/搜索）
  optional OfflinePushInfo offline_push_info = 61;
  repeated google.protobuf.Any extensions = 1000;  // 兼容用；业务扩展推荐 CustomContent
  string tenant = 1001;                // 租户ID（可请求级注入）
}

// 时间线：不随 Message 同步，由 GetMessageDetail / 按需扩展返回。
message MessageTimeline {
  google.protobuf.Timestamp created_at = 1;    // 创建时间
  google.protobuf.Timestamp persisted_at = 2;  // 持久化时间
  google.protobuf.Timestamp delivered_at = 3;  // 送达时间
  google.protobuf.Timestamp read_at = 4;       // 已读时间
}

// 已读记录：不随 Message 同步，由 GetMessageReadReceipts 等按需接口返回。
message MessageReadRecord {
  string user_id = 1;             // 已读用户ID
  google.protobuf.Timestamp read_at = 2;
  google.protobuf.Timestamp burned_at = 3;      // 阅后即焚销毁时间
}


syntax = "proto3";

package flare.common.v1;

import "google/protobuf/timestamp.proto";
import "common/errors.proto";
import "common/event.proto";
import "common/conversation_models.proto";

// =============================================================================
// Sync BC - CQRS 读侧：按会话事件拉取 + 会话列表增量
// =============================================================================
// 1. 按会话：SyncRequest(conversation_id, last_seq) → EventEnvelope（事件流消费后的读模型）。
// 2. 会话列表：SyncConversations* / ConversationSyncAll* → patches 或 full list（读模型）。

// -----------------------------------------------------------------------------
// 1. 消息/事件同步（按会话）
// -----------------------------------------------------------------------------

// 事件同步请求：按会话拉取 last_seq 之后的事件；响应为本文件 SyncResponse。
message SyncRequest {
  string conversation_id = 1;  // 必填
  uint64 last_seq = 2;        // 客户端已收最大 seq，服务端返回 > last_seq
  string cursor = 3;          // 分页游标
  int32 limit = 4;
}

message SyncResponse {
  EventEnvelope envelope = 1;
  flare.common.v1.RpcStatus status = 2;
}

// -----------------------------------------------------------------------------
// 2. 会话同步：全量/增量
// -----------------------------------------------------------------------------

message ConversationSyncAllRequest {
  string user_id = 1;                      // 可选，可由鉴权上下文注入
  ConversationSyncAllOptions sync_options = 3;
}

message ConversationSyncAllResponse {
  repeated ConversationSummary conversations = 1;
  google.protobuf.Timestamp server_conversation_cursor = 2;
  uint64 server_max_seq = 3;
  map<string, string> metadata = 4;
}

message GetConversationDetailRequest {
  string conversation_id = 1;
}

message GetConversationDetailResponse {
  ConversationDetail detail = 1;
  flare.common.v1.RpcStatus status = 2;
  map<string, string> metadata = 3;
}

message SyncConversationsRequest {
  string user_id = 1;
  google.protobuf.Timestamp client_conversation_cursor = 2;
  int32 limit = 3;
}

enum ConversationPatchType {
  CONVERSATION_PATCH_UNSPECIFIED = 0;
  CONVERSATION_PATCH_LIGHT = 1;    // 轻量
  CONVERSATION_PATCH_SUMMARY = 2;  // 全量摘要
  CONVERSATION_PATCH_REMOVED = 3;
  CONVERSATION_PATCH_CREATED = 4;
  CONVERSATION_PATCH_DETAIL_REQUIRED = 5;  // 需拉详情
}

message ConversationPatch {
  string conversation_id = 1;
  ConversationPatchType patch_type = 2;
  ConversationLight light = 10;
  ConversationSummary summary = 11;
  google.protobuf.Timestamp patched_at = 13;
}

message SyncConversationsResponse {
  repeated ConversationPatch patches = 1;
  google.protobuf.Timestamp server_conversation_cursor = 2;
  bool has_more = 3;
  flare.common.v1.RpcStatus status = 5;
}

// -----------------------------------------------------------------------------
// 3. 会话同步选项
// -----------------------------------------------------------------------------

message ConversationSyncOptions {
  bool include_participants = 1;
  bool include_policy = 2;
  int32 max_batch_size = 3;
}

message ConversationSyncAllOptions {
  bool include_archived = 1;
  bool include_deleted = 2;
  int32 max_batch_size = 3;
}

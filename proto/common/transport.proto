syntax = "proto3";

package flare.common.v1;

import "common/message.proto";
import "common/event.proto";
import "common/ack.proto";
import "common/sync.proto";  // 含 SyncRequest/SyncResponse 与会话同步（ConversationSync*）

// =============================================================================
// Connection BC 线缆协议（WebSocket/QUIC 等长连接）
// =============================================================================
// 扁平 oneof，一层解析得 payload。上行：send_message(Message) / send_event(Event) / sync_* / push_ack；下行：event_envelope / send_ack / operation_ack / sync_* / error。

// 推送层扩展：与 CustomContent、CustomEvent 形成三层扩展；不占会话 seq、不落事件表
message CustomPushData {
  string type = 1;
  bytes payload = 2;
  map<string, string> metadata = 3;
}

// 客户端上行：扁平 oneof；发消息用 send_message(Message)，发操作用 send_event(Event)
message ClientPacket {
  oneof payload {
    Message send_message = 1;
    Event send_event = 2;         // 操作统一为 Event（type+payload+request_id）
    SyncRequest sync_request = 3;
    SyncConversationsRequest sync_conversations = 4;
    ConversationSyncAllRequest sync_conversations_all = 5;
    GetConversationDetailRequest get_conversation_detail = 6;
    PushAck push_ack = 7;
  }
}

// 服务端下行：扁平 oneof，一次解析得到事件批/ACK/响应/推送/错误
message ServerPacket {
  oneof payload {
    EventEnvelope event_envelope = 1;
    SendAck send_ack = 2;
    OperationAck operation_ack = 3;
    SyncResponse sync_resp = 4;
    SyncConversationsResponse sync_conversations_resp = 5;
    ConversationSyncAllResponse sync_conversations_all_resp = 6;
    GetConversationDetailResponse get_conversation_detail_resp = 7;
    CustomPushData custom_push = 8;
    ErrorPacket error = 100;
  }
}

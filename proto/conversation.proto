syntax = "proto3";

package flare.conversation.v1;

import "google/protobuf/timestamp.proto";
import "common/conversation_models.proto";
import "common/errors.proto";
import "common/metadata.proto";
import "common/message.proto";
import "common/sync.proto";

// 会话同步与管理服务。约定：user_id、tenant_id 可由 gRPC metadata 注入，请求体可省略。

// -----------------------------------------------------------------------------
// 枚举定义
// -----------------------------------------------------------------------------

enum SortOrder {
  SORT_ORDER_UNSPECIFIED = 0;
  SORT_ORDER_UPDATED_DESC = 1;   // 按更新时间降序
  SORT_ORDER_UPDATED_ASC = 2;    // 按更新时间升序
  SORT_ORDER_UNREAD_DESC = 3;    // 按未读数降序
}


// -----------------------------------------------------------------------------
// 数据模型
// -----------------------------------------------------------------------------

// 会话摘要（用于会话列表展示）
// 使用 common 层的 ConversationSummary 类型

// 会话对象（完整的会话信息）
message Conversation {
  string conversation_id = 1;
  string conversation_type = 2;
  string business_type = 3;
  map<string, string> attributes = 4;
  repeated flare.common.v1.ConversationParticipant participants = 5;
  flare.common.v1.ConversationVisibility visibility = 6;
  flare.common.v1.ConversationLifecycleState lifecycle_state = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  flare.common.v1.ConversationPolicy policy = 10;
}

// 会话参与者
message ConversationParticipant {
  string user_id = 1;
  repeated string roles = 2;
  bool muted = 3;
  bool pinned = 4;
  map<string, string> attributes = 5;
}

// 会话策略
message ConversationPolicy {
  flare.common.v1.ConflictResolution conflict_resolution = 1;
  int32 max_devices = 2;
  bool allow_anonymous = 3;
  bool allow_history_sync = 4;
  map<string, string> metadata = 5;
}

// 设备在线状态
message DevicePresence {
  string device_id = 1;
  string device_platform = 2;
  flare.common.v1.DeviceState state = 3;
  google.protobuf.Timestamp last_seen_at = 4;
}

// 确认游标
message AckCursor {
  string conversation_id = 1;
  int64 message_ts = 2;
}

// 参与者角色更新
message ParticipantRoleUpdate {
  string user_id = 1;
  repeated string roles = 2;
}

// -----------------------------------------------------------------------------
// 会话引导 / 首屏相关消息
// -----------------------------------------------------------------------------

message ConversationBootstrapRequest {
  string user_id = 1;  // 可由 metadata 注入
  map<string, int64> client_cursor_map = 2;
  bool include_recent_messages = 3;
  int32 recent_message_limit = 4;
  string device_id = 5;
  string device_platform = 6;
}

message ConversationBootstrapResponse {
  repeated flare.common.v1.ConversationSummary conversations = 1;
  repeated flare.common.v1.Message recent_messages = 2;  // 使用 common 中的统一 Message 定义
  repeated DevicePresence devices = 3;
  map<string, int64> server_cursor_map = 4;
  ConversationPolicy policy = 5;
  flare.common.v1.RpcStatus status = 6;
}

// -----------------------------------------------------------------------------
// 会话列表 / 同步相关消息
// -----------------------------------------------------------------------------

message ListConversationsRequest {
  string user_id = 1;  // 可由 metadata 注入
  string cursor = 2;
  int32 limit = 3;
  SortOrder order = 4;
}

message ListConversationsResponse {
  repeated flare.common.v1.ConversationSummary conversations = 1;
  string next_cursor = 2;
  bool has_more = 3;
  flare.common.v1.RpcStatus status = 4;
}

message SyncMessagesRequest {
  string user_id = 1;  // 可由 metadata 注入
  string conversation_id = 2;
  int64 since_ts = 3;
  string cursor = 4;
  int32 limit = 5;
  bool include_ack = 6;
}

message SyncMessagesResponse {
  repeated flare.common.v1.Message messages = 1;  // 使用 common 中的统一 Message 定义
  string next_cursor = 2;
  int64 server_cursor_ts = 3;
  flare.common.v1.RpcStatus status = 4;
}

message UpdateCursorRequest {
  string user_id = 1;  // 可由 metadata 注入
  string conversation_id = 2;
  int64 message_ts = 3;
  string device_id = 5;
}

message UpdateCursorResponse {
  flare.common.v1.RpcStatus status = 1;
}

// 标记会话已读（未读数零成本：更新 last_read_msg_seq，供 Message Orchestrator 调用）
message MarkConversationAsReadRequest {
  string conversation_id = 1;
  int64 read_seq = 2;  // 可选；为 0 时由服务端用该会话 last_message_seq 作为已读位置
}

message MarkConversationAsReadResponse {
  flare.common.v1.RpcStatus status = 1;
}

message UpdatePresenceRequest {
  string user_id = 1;
  string device_id = 2;
  string device_platform = 3;
  flare.common.v1.DeviceState state = 4;
  flare.common.v1.ConflictResolution resolution = 6;
  bool notify_conflict = 7;
  string conflict_reason = 8;
}

message UpdatePresenceResponse {
  flare.common.v1.RpcStatus status = 1;
}

message ForceConversationSyncRequest {
  string user_id = 3;
  repeated string conversation_ids = 4;
  string reason = 5;
}

message ForceConversationSyncResponse {
  flare.common.v1.RpcStatus status = 1;
}

// -----------------------------------------------------------------------------
// 会话管理相关消息
// -----------------------------------------------------------------------------

message CreateConversationRequest {
  string conversation_type = 3;
  string business_type = 4;
  repeated ConversationParticipant participants = 5;
  map<string, string> attributes = 6;
  flare.common.v1.ConversationVisibility visibility = 7;
}

message CreateConversationResponse {
  Conversation conversation = 1;
  flare.common.v1.RpcStatus status = 2;
}

message UpdateConversationRequest {
  string conversation_id = 3;
  string display_name = 4;
  map<string, string> attributes = 5;
  flare.common.v1.ConversationVisibility visibility = 6;
  flare.common.v1.ConversationLifecycleState lifecycle_state = 7;
}

message UpdateConversationResponse {
  Conversation conversation = 1;
  flare.common.v1.RpcStatus status = 2;
}

message DeleteConversationRequest {
  string conversation_id = 3;
  bool hard_delete = 4;
}

message DeleteConversationResponse {
  flare.common.v1.RpcStatus status = 1;
}

message ManageParticipantsRequest {
  string conversation_id = 3;
  repeated ConversationParticipant to_add = 4;
  repeated string to_remove = 5;
  repeated ParticipantRoleUpdate role_updates = 6;
}

message ManageParticipantsResponse {
  repeated ConversationParticipant participants = 1;
  flare.common.v1.RpcStatus status = 2;
}

message BatchAcknowledgeRequest {
  string user_id = 3;
  repeated AckCursor cursors = 4;
}

message BatchAcknowledgeResponse {
  flare.common.v1.RpcStatus status = 1;
}

message SearchConversationsRequest {
  repeated flare.common.v1.FilterExpression filters = 3;
  repeated flare.common.v1.SortExpression sort = 4;
  flare.common.v1.Pagination pagination = 5;
}

message SearchConversationsResponse {
  repeated flare.common.v1.ConversationSummary conversations = 1;
  flare.common.v1.Pagination pagination = 2;
  flare.common.v1.RpcStatus status = 3;
}

// -----------------------------------------------------------------------------
// 话题（Thread）相关消息
// -----------------------------------------------------------------------------

// 话题信息
message Thread {
  string id = 1;                                    // 话题ID（通常等于 root_message_id）
  string conversation_id = 2;                            // 会话ID（群组ID）
  string root_message_id = 3;                       // 根消息ID（话题起始消息）
  string title = 4;                                 // 话题标题（可选）
  string creator_id = 5;                            // 创建者ID
  int32 reply_count = 6;                            // 回复数量
  google.protobuf.Timestamp last_reply_at = 7;      // 最后回复时间
  string last_reply_id = 8;                         // 最后回复消息ID
  string last_reply_user_id = 9;                    // 最后回复用户ID
  int32 participant_count = 10;                     // 参与者数量
  bool is_pinned = 11;                              // 是否置顶
  bool is_locked = 12;                              // 是否锁定
  bool is_archived = 13;                            // 是否归档
  google.protobuf.Timestamp created_at = 14;        // 创建时间
  google.protobuf.Timestamp updated_at = 15;         // 更新时间
  map<string, string> extra = 16;                   // 扩展字段
}

// 创建话题请求
message CreateThreadRequest {
  string conversation_id = 1;                            // 会话ID
  string root_message_id = 2;                       // 根消息ID
  string title = 3;                                 // 话题标题（可选）

}

// 创建话题响应
message CreateThreadResponse {
  Thread thread = 1;                                // 创建的话题
  flare.common.v1.RpcStatus status = 2;
}

// 获取话题列表请求
message ListThreadsRequest {
  string conversation_id = 1;                            // 会话ID
  int32 limit = 2;                                  // 返回数量限制（默认 50）
  int32 offset = 3;                                 // 偏移量（默认 0）
  bool include_archived = 4;                        // 是否包含归档话题（默认 false）
  SortOrder sort_order = 5;                         // 排序方式（默认 UPDATED_DESC）
}

// 获取话题列表响应
message ListThreadsResponse {
  repeated Thread threads = 1;                      // 话题列表
  int32 total_count = 2;                            // 总数量
  bool has_more = 3;                                // 是否还有更多
  flare.common.v1.RpcStatus status = 4;
}

// 获取话题详情请求
message GetThreadRequest {
  string thread_id = 1;                             // 话题ID
}

// 获取话题详情响应
message GetThreadResponse {
  Thread thread = 1;                                 // 话题详情
  flare.common.v1.RpcStatus status = 2;
}

// 更新话题请求
message UpdateThreadRequest {
  string thread_id = 1;                             // 话题ID
  optional string title = 2;                       // 新标题（可选）
  optional bool is_pinned = 3;                      // 是否置顶（可选）
  optional bool is_locked = 4;                      // 是否锁定（可选）
  optional bool is_archived = 5;                    // 是否归档（可选）

}

// 更新话题响应
message UpdateThreadResponse {
  Thread thread = 1;                                // 更新后的话题
  flare.common.v1.RpcStatus status = 2;
}

// 删除话题请求
message DeleteThreadRequest {
  string thread_id = 1;                             // 话题ID

}

// 删除话题响应
message DeleteThreadResponse {
  bool success = 1;                                 // 是否成功
  flare.common.v1.RpcStatus status = 2;
}

// -----------------------------------------------------------------------------
// 服务定义
// -----------------------------------------------------------------------------

service ConversationService {
  // 会话引导（首次登录或重新连接，获取会话摘要，支持增量同步）
  rpc ConversationBootstrap(ConversationBootstrapRequest) returns (ConversationBootstrapResponse);
  
  // 列出会话（分页获取，支持按更新时间或未读数排序）
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  
  // 同步消息（从指定时间点或游标开始同步，支持游标分页）
  rpc SyncMessages(SyncMessagesRequest) returns (SyncMessagesResponse);

  // 会话增量同步（Patch 模式）
  rpc SyncConversations(flare.common.v1.SyncConversationsRequest) returns (flare.common.v1.SyncConversationsResponse);

  // 会话全量恢复（客户端本地 Conversation 缓存崩溃时使用）
  rpc GetAllConversations(flare.common.v1.ConversationSyncAllRequest) returns (flare.common.v1.ConversationSyncAllResponse);
  
  // 更新游标（更新读取位置，影响未读数统计，每个设备独立游标）
  rpc UpdateCursor(UpdateCursorRequest) returns (UpdateCursorResponse);
  
  // 标记会话已读（更新 last_read_msg_seq 与未读数，供 Message Orchestrator 标记会话已读时调用）
  rpc MarkConversationAsRead(MarkConversationAsReadRequest) returns (MarkConversationAsReadResponse);
  
  // 更新设备在线状态（支持设备冲突处理）
  rpc UpdatePresence(UpdatePresenceRequest) returns (UpdatePresenceResponse);
  
  // 强制会话同步（服务端主动触发，用于数据修复或强制刷新）
  rpc ForceConversationSync(ForceConversationSyncRequest) returns (ForceConversationSyncResponse);

  // --- 管理能力 ---
  
  // 创建会话（单聊、群聊等，设置参与者、可见性等属性）
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse);
  
  // 更新会话（显示名称、属性、可见性、生命周期状态等）
  rpc UpdateConversation(UpdateConversationRequest) returns (UpdateConversationResponse);
  
  // 删除会话（hard_delete=true物理删除，false逻辑删除）
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
  
  // 管理参与者（批量添加、移除、更新角色）
  rpc ManageParticipants(ManageParticipantsRequest) returns (ManageParticipantsResponse);
  
  // 批量确认（批量更新多个会话的读取游标）
  rpc BatchAcknowledge(BatchAcknowledgeRequest) returns (BatchAcknowledgeResponse);
  
  // 搜索会话（支持复杂过滤和排序）
  rpc SearchConversations(SearchConversationsRequest) returns (SearchConversationsResponse);

  // --- 话题（Thread）管理 ---
  
  // 创建话题
  rpc CreateThread(CreateThreadRequest) returns (CreateThreadResponse);
  
  // 获取话题列表
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);
  
  // 获取话题详情
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);
  
  // 更新话题
  rpc UpdateThread(UpdateThreadRequest) returns (UpdateThreadResponse);
  
  // 删除话题
  rpc DeleteThread(DeleteThreadRequest) returns (DeleteThreadResponse);
}

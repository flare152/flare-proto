syntax = "proto3";

package flare.common.v1;

import "google/protobuf/timestamp.proto";
import "metadata.proto";
import "message_content.proto";
import "enums.proto";  // ConversationType

// =============================================================================
// Flare IM 消息协议（基座：简洁、通用、可扩展）
// =============================================================================
// 时间线/已读/反应/编辑历史/可见性等按需由事件流与独立接口提供（见 event.proto 消息操作读模型、各服务 RPC）。

// 消息状态（FSM）
enum MessageStatus {
  MESSAGE_STATUS_UNSPECIFIED = 0;
  MESSAGE_STATUS_CREATED = 1; // 已创建
  MESSAGE_STATUS_SENT = 2; // 已发送（正常态，可编辑）
  MESSAGE_STATUS_DELIVERED = 3; // 已送达
  MESSAGE_STATUS_READ = 4; // 已读
  MESSAGE_STATUS_FAILED = 5; // 发送失败
  MESSAGE_STATUS_RECALLED = 6; // 已撤回（终态）
  MESSAGE_STATUS_DELETED_HARD = 7; // 已硬删除（终态，仅管理员）
  MESSAGE_STATUS_DELETED_SOFT = 8; // 已软删除（用户维度，可恢复）
}

// 消息来源
enum MessageSource {
  MESSAGE_SOURCE_UNSPECIFIED = 0;
  MESSAGE_SOURCE_USER = 1; // 用户消息
  MESSAGE_SOURCE_SYSTEM = 2; // 系统消息
  MESSAGE_SOURCE_BOT = 3; // 机器人消息
  MESSAGE_SOURCE_ADMIN = 4; // 管理员消息
}

// =============================================================================
// 消息类型枚举
// =============================================================================
// 区间：0 未指定；1-29 基础内容；30-59 富媒体；60-79 系统/通知；80-99 平台推荐；100 自定义；101-115 平台能力。

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;  // 未指定类型
  MESSAGE_TYPE_TEXT = 1;  // 纯文本，支持 @ 提及
  MESSAGE_TYPE_IMAGE = 2;  // 图片（含缩略图、原图）
  MESSAGE_TYPE_VIDEO = 3;  // 视频
  MESSAGE_TYPE_AUDIO = 4;  // 语音/音频
  MESSAGE_TYPE_FILE = 5;  // 文件附件
  MESSAGE_TYPE_LOCATION = 6;  // 位置/地理坐标
  MESSAGE_TYPE_CARD = 7;  // 名片（联系人/群）
  MESSAGE_TYPE_STICKER = 8;  // 表情贴纸
  MESSAGE_TYPE_EMOJI = 9;  // 表情符号
  MESSAGE_TYPE_LINK_CARD = 11;  // 链接预览卡片
  MESSAGE_TYPE_MERGE_FORWARD = 12;  // 合并转发消息
  MESSAGE_TYPE_MINI_PROGRAM = 13;  // 小程序/应用卡片
  MESSAGE_TYPE_THREAD = 14;  // 话题/子线程根消息
  MESSAGE_TYPE_QUOTE = 15;  // 引用回复
  MESSAGE_TYPE_RICH_TEXT = 30;  // 富文本：Rich Doc 主存储（Markdown/HTML/编辑器均归一化为此）
  MESSAGE_TYPE_IMAGE_GROUP = 32;  // 多图/图组
  MESSAGE_TYPE_SYSTEM = 60;  // 通用系统消息：入群/退群/踢人/解散等由 SystemContent.event_kind 区分
  MESSAGE_TYPE_NOTIFICATION = 61;  // 会话内通知：可推送、角标
  MESSAGE_TYPE_POLL = 80;  // 投票
  MESSAGE_TYPE_TASK = 81;  // 任务
  MESSAGE_TYPE_SCHEDULE = 82;  // 日程/会议
  MESSAGE_TYPE_ANNOUNCEMENT = 83;  // 公告
  MESSAGE_TYPE_CUSTOM = 100;  // 业务自定义：CustomContent.type + payload，如红包、转账、打卡等
  MESSAGE_TYPE_E2E_PLACEHOLDER = 111;  // 端到端加密占位（密文由客户端解密后替换）
  MESSAGE_TYPE_DECRYPT_FAILED = 112;  // 解密失败占位（无法解密时展示）
  MESSAGE_TYPE_EXTERNAL = 113;  // 外部系统/第三方导入
  MESSAGE_TYPE_IMPORTED = 114;  // 历史导入消息
  MESSAGE_TYPE_MIGRATION = 115;  // 迁移/同步产生的消息
}

enum DiffusionStrategy {
  DIFFUSION_STRATEGY_UNSPECIFIED = 0;  // 未指定
  DIFFUSION_STRATEGY_READ = 1;  // 读扩散（一会话一流，当前唯一策略）
}

// MessagePreview 定义在 common/message_content.proto（type 为 int32，与 MessageType 枚举值一致）
// ----------------------------------------------------------------------------
// 核心消息结构（基座）
// ----------------------------------------------------------------------------

// 消息（基座：身份 + 顺序 + 类型与内容 + 状态 + 扩展）
message Message {
  string server_id = 1;  // 服务端消息 ID（全局唯一）
  string conversation_id = 2;  // 会话 ID
  string client_msg_id = 3;  // 客户端消息 ID（去重幂等）
  string sender_id = 4;  // 发送者 ID
  MessageSource source = 5;  // 消息来源（用户/系统/机器人/管理员）
  uint64 seq = 6;  // 会话内序列号（读扩散：一会话一流）
  google.protobuf.Timestamp timestamp = 7;  // 时间戳
  ConversationType conversation_type = 8; // 会话类型（单聊/群聊/频道）
  MessageType message_type = 9;  // 消息类型（与 content 解析方式对应）
  string channel_id = 12;  // 会话频道 ID：单聊=对方 user_id，群聊=群 ID，频道/话题=对应 ID
  string sender_name = 13;  // 发送者昵称（展示用，可选）
  string sender_avatar = 14;  // 发送者头像 URL（展示用，可选）
  bytes content = 20;  // 消息体：message_content.proto 中 MessageContent 的 protobuf 编码（与 message_type 一致）
  MessageStatus status = 30;  // 消息状态（含已撤回等，见 MessageStatus）
  optional OfflinePushInfo offline_push_info = 61;  // 离线推送展示（可选）
  map<string, string> extra = 23;  // 扩展键值（conversation_type、business_type、thread_id 等）
  map<string, bytes> extensions = 1000;  // 业务扩展（key 建议命名空间，如 biz.xxx）
}

// -----------------------------------------------------------------------------
// 下行
// -----------------------------------------------------------------------------
/// 推送消息和通知
message MessagePush {
  repeated Message messages = 1;       // 消息
  repeated Message notifications = 2; // 通知
}

// 离线推送展示（可选）
message OfflinePushInfo {
  string title = 1;  // 推送标题
  string body = 2;  // 推送正文/摘要
  string sound = 3;  // 音效（如 iOS sound）
  bool badge = 4;  // 是否角标 +1
  string payload = 5;  // 自定义载荷（跳转参数等）
}

// 消息时间线（持久化/投递/已读等，SendMessageResponse 等按需返回）
message MessageTimeline {
  google.protobuf.Timestamp created_at = 1;    // 创建时间
  google.protobuf.Timestamp persisted_at = 2;  // 持久化完成时间
  google.protobuf.Timestamp delivered_at = 3;  // 投递时间
  google.protobuf.Timestamp read_at = 4;       // 已读时间
}

// 单条已读记录（GetReadReceipts / 已读列表查询）
message MessageReadRecord {
  string user_id = 1;                          // 已读用户 ID
  google.protobuf.Timestamp read_at = 2;       // 已读时间
  optional google.protobuf.Timestamp burned_at = 3;  // 阅后即焚已烧毁时间（可选）
}

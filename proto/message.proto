syntax = "proto3";

package flare.message.v1;

import "google/protobuf/timestamp.proto";
import "common/ack.proto";
import "common/enums.proto";
import "common/errors.proto";
import "common/event.proto";
import "common/metadata.proto";
import "common/message.proto";
import "common/message_content.proto";
import "common/message_extended.proto";

// 消息编排服务
// 约定：tenant_id、operator_id、request_id 由 gRPC metadata 注入，请求体可省略（见 common/metadata.proto）。

// -----------------------------------------------------------------------------
// 消息发送相关
// -----------------------------------------------------------------------------

// 发送消息请求
message SendMessageRequest {
  // 会话ID，标识消息发送到哪个会话
  // 格式：{conversation_type}:{conversation_id}，如 "single:user-10001-user-10002"
  // 必需字段，不能为空
  string conversation_id = 1;
  
  // 消息内容，包含消息类型、内容、元数据等
  // 必需字段，不能为空
  // 消息大小限制：单条消息最大64KB
  // 注意：消息必须包含 conversation_id（IM核心概念）
  flare.common.v1.Message message = 2;
  // oneof payload {
  //   flare.common.v1.UnifiedMessage unified_message = 9;
  // }
  
  // 是否同步等待持久化
  // true: 等待消息完全持久化后返回，延迟较高但保证持久化成功
  // false: 立即返回，延迟较低但无法保证持久化成功（默认）
  // 建议：非关键路径使用false，关键路径使用true
  bool sync = 3;
}

// 发送消息响应
message SendMessageResponse {
  // 是否发送成功
  // true: 发送成功（同步模式下表示已持久化，异步模式下表示已入队）
  // false: 发送失败，查看status获取错误信息
  bool success = 1;
  
  // 服务端生成的消息ID（server_id），全局唯一标识符
  string server_msg_id = 2;

  // 服务端生成的消息seq
  uint64 seq =  3;               
  
  // 发送时间，消息发送的时间戳
  google.protobuf.Timestamp sent_at = 4;
  
  // 消息时间线信息
  // 包含消息的持久化时间、投递时间、已读时间等
  flare.common.v1.MessageTimeline timeline = 5;
  // 新结构的消息（可选）- 暂未定义
  // flare.common.v1.UnifiedMessage unified_message = 6;
  
  // RPC状态，包含错误码和错误信息
  // ERROR_CODE_OK表示成功，其他值表示失败
  flare.common.v1.RpcStatus status = 7;
}

// 批量发送消息请求
message BatchSendMessageRequest {
  // 消息请求列表
  // 最多支持100条消息，超过限制会返回错误
  // 每条消息都会经过PreSend Hook校验
  repeated SendMessageRequest messages = 1;
}

// 批量发送消息响应
message BatchSendMessageResponse {
  // 成功数量
  // 成功发送的消息数量
  int32 success_count = 1;
  
  // 失败数量
  // 发送失败的消息数量
  int32 fail_count = 2;
  
  // 成功的消息ID列表
  // 按请求顺序返回成功的消息ID
  repeated string message_ids = 3;
  
  // 失败的消息详情列表
  // 包含失败的消息ID、错误码和错误信息
  repeated FailedMessage failures = 4;
  
  // RPC状态，包含错误码和错误信息
  // 部分成功时，status.code仍为ERROR_CODE_OK，但failures包含失败详情
  flare.common.v1.RpcStatus status = 5;
}

// 失败的消息详情
message FailedMessage {
  // 消息ID
  // 失败的消息ID（如果消息ID已生成）
  string message_id = 1;
  
  // 错误码
  // 失败的错误码，如ERROR_CODE_PERMISSION_DENIED、ERROR_CODE_QUOTA_EXCEEDED
  flare.common.v1.ErrorCode code = 2;
  
  // 错误消息
  // 人类可读的错误描述
  string error_message = 3;
}

// 发送系统消息请求
message SendSystemMessageRequest {
  // 会话ID，标识消息发送到哪个会话
  // 格式：{conversation_type}:{conversation_id}
  // 必需字段，不能为空
  string conversation_id = 1;
  
  // 消息内容，包含消息类型、内容、元数据等
  // 必需字段，不能为空
  // 注意：消息必须包含 conversation_id（IM核心概念）
  flare.common.v1.Message message = 2;
  
  // 系统消息类型
  // 标识系统消息的类型，如 "group_dissolve"（群解散）、"member_quit"（成员退出）
  // 必需字段，不能为空
  // 用于业务系统识别和处理不同类型的系统消息
  string system_message_type = 3;
  
  
}

// 发送系统消息响应
message SendSystemMessageResponse {
  // 是否发送成功
  bool success = 1;
  
  // 消息ID，全局唯一标识符
  // 成功时返回
  string message_id = 2;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 3;
}

// -----------------------------------------------------------------------------
// 消息查询相关消息
// -----------------------------------------------------------------------------

// 查询消息请求
message QueryMessagesRequest {
  // 会话ID，标识要查询的会话
  // 格式：{conversation_type}:{conversation_id}
  // 必需字段，不能为空
  string conversation_id = 1;
  
  // 起始时间（毫秒时间戳）
  // 查询范围的起始时间（包含），Unix时间戳（毫秒）
  // 可选字段，不提供时从最早的消息开始查询
  int64 start_time = 2;
  
  // 结束时间（毫秒时间戳）
  // 查询范围的结束时间（包含），Unix时间戳（毫秒）
  // 可选字段，不提供时查询到最新的消息
  int64 end_time = 3;
  
  // 返回数量限制
  // 本次查询返回的最大消息数
  // 范围：1-1000，默认值：50，建议值：20-100
  int32 limit = 4;
  
  // 游标
  // 用于分页的游标，首次查询为空，后续查询使用上次返回的next_cursor
  // 格式：服务端生成的游标字符串，客户端不应解析其内容
  string cursor = 5;
  
  // 分页信息
  // 可选字段，用于分页配置
  flare.common.v1.Pagination pagination = 8;
}

// 查询消息响应
message QueryMessagesResponse {
  // 消息列表
  // 符合条件的消息列表，按时间倒序排列（最新的在前）
  repeated flare.common.v1.Message messages = 1;
  // 新结构的消息列表（可选）- 暂未定义
  // repeated flare.common.v1.UnifiedMessage unified_messages = 6;
  
  // 下一页游标
  // 用于获取下一页数据的游标，空表示没有更多数据
  string next_cursor = 2;
  
  // 是否还有更多数据
  // true: 还有更多数据，可以使用next_cursor获取下一页
  // false: 没有更多数据，已到达最后一页
  bool has_more = 3;
  
  // 分页信息
  // 包含分页的详细信息，如总记录数、上一页游标等
  flare.common.v1.Pagination pagination = 4;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 5;
}

// 搜索消息请求
message SearchMessagesRequest {
  
  // 过滤条件列表
  // 用于构建搜索条件，多个条件之间是AND关系
  // 示例：按会话类型过滤、按消息类型过滤、按发送者过滤
  repeated flare.common.v1.FilterExpression filters = 3;
  
  // 排序规则列表
  // 用于指定搜索结果的排序方式，按顺序应用
  // 示例：按时间倒序、按发送者排序
  repeated flare.common.v1.SortExpression sort = 4;
  
  // 分页信息
  // 必需字段，用于分页配置
  flare.common.v1.Pagination pagination = 5;
  
  // 时间范围
  // 可选字段，用于限制搜索的时间范围
  flare.common.v1.TimeRange time_range = 6;
}

// 搜索消息响应
message SearchMessagesResponse {
  // 搜索结果消息列表
  // 符合搜索条件的消息列表，按排序规则排列
  repeated flare.common.v1.Message messages = 1;
  // 新结构的搜索结果（可选）- 暂未定义
  // repeated flare.common.v1.UnifiedMessage unified_messages = 4;
  
  // 分页信息
  // 包含分页的详细信息，如总记录数、游标等
  flare.common.v1.Pagination pagination = 2;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 3;
}

// 获取消息请求
message GetMessageRequest {
  
  
  // 消息ID，全局唯一标识符
  // 格式：{tenant_id}:{timestamp}:{random}
  // 必需字段，不能为空
  string message_id = 3;
}

// 获取消息响应
message GetMessageResponse {
  // 消息详情
  // 完整的消息信息，包含消息内容、时间线、状态等
  flare.common.v1.Message message = 1;
  // 新结构消息详情（可选）- 暂未定义
  // flare.common.v1.UnifiedMessage unified_message = 3;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 2;
}

// -----------------------------------------------------------------------------
// 消息操作相关消息
// -----------------------------------------------------------------------------

// 撤回消息请求（与 common/event.proto MessageRecallEvent 对齐；operator_id 由 metadata 注入）
message RecallMessageRequest {
  string message_id = 1;  // 即 server_msg_id，必填
  string reason = 2;
  int32 recall_time_limit_seconds = 3;  // 可选，不填用系统默认
  string conversation_id = 4;  // 可选；当服务端未配置 StorageReader 时由客户端提供，用于解析会话
}

// 撤回消息响应
message RecallMessageResponse {
  // 是否撤回成功
  // true: 撤回成功，消息已被标记为已撤回
  // false: 撤回失败，查看error_message获取失败原因
  bool success = 1;
  
  // 错误消息
  // 撤回失败时的错误描述，成功时为空
  string error_message = 2;
  
  // 撤回时间
  // 消息被撤回的时间戳，格式：RFC3339格式
  google.protobuf.Timestamp recalled_at = 3;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 4;
}

// 删除消息请求（与 MessageDeleteEvent 对齐；operator 由 metadata 注入）
message DeleteMessageRequest {
  string conversation_id = 1;
  repeated string message_ids = 2;  // 最多 100
  flare.common.v1.DeleteType delete_type = 3;
  string reason = 4;
  bool notify_others = 5;
}

// 删除消息响应
message DeleteMessageResponse {
  // 是否删除成功
  // true: 删除成功（至少删除了一条消息）
  // false: 删除失败，查看status获取错误信息
  bool success = 1;
  
  // 删除的消息数量
  // 实际删除的消息数量，可能小于请求的消息数量（如果部分消息不存在）
  int32 deleted_count = 2;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 3;
}

// 标记消息已读请求（与 ReadReceiptEvent 对齐；user_id 由 metadata 注入）
message MarkMessageReadRequest {
  string message_id = 1;
  google.protobuf.Timestamp read_at = 2;
  bool burn_after_read = 3;
}

// 标记消息已读响应
message MarkMessageReadResponse {
  // 是否标记成功
  // true: 标记成功，消息已读状态已更新
  // false: 标记失败，查看error_message获取失败原因
  bool success = 1;
  
  // 错误消息
  // 标记失败时的错误描述，成功时为空
  string error_message = 2;
  
  // 已读时间
  // 消息被标记为已读的时间戳，格式：RFC3339格式
  google.protobuf.Timestamp read_at = 3;
  
  // 销毁时间
  // 阅后即焚消息的销毁时间戳，格式：RFC3339格式
  // 仅当消息设置了阅后即焚时返回
  google.protobuf.Timestamp burned_at = 4;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 5;
}

// -----------------------------------------------------------------------------
// 服务定义
// -----------------------------------------------------------------------------

service MessageService {
  // ============================================================================
  // 1. 发送相关（Send）
  // ============================================================================
  
  // 发送单条消息（将消息发送到指定会话，经过PreSend Hook校验，支持同步/异步模式）
  // 注意：回复消息通过设置 Message.quote 字段并调用 SendMessage 实现
  // 注意：引用消息通过设置 Message.quote 字段并调用 SendMessage 实现
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  
  // 批量发送消息（一次性发送多条消息，最多100条，每条消息都经过PreSend Hook校验）
  rpc BatchSendMessage(BatchSendMessageRequest) returns (BatchSendMessageResponse);
  
  // 发送系统消息（发送系统消息，跳过PreSend业务校验，需要管理员权限或系统权限）
  rpc SendSystemMessage(SendSystemMessageRequest) returns (SendSystemMessageResponse);
  
  // ============================================================================
  // 2. 操作相关（Operation，与 common/event.proto Event 一一对应）
  // ============================================================================
  // 统一入口：ExecuteEvent(Event) 返回 OperationAck；tenant_id/operator_id/request_id 由 metadata 注入。
  rpc ExecuteEvent(flare.common.v1.Event) returns (flare.common.v1.OperationAck);

  // 撤回消息
  rpc RecallMessage(RecallMessageRequest) returns (RecallMessageResponse);
  
  // 编辑消息（编辑已发送的消息内容，支持编辑历史记录，只有发送者可以编辑）
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  
  // 删除消息（从指定会话中删除一条或多条消息，最多100条，默认软删除）
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  
  // 标记消息已读（记录用户对消息的已读状态，支持阅后即焚功能）
  rpc MarkMessageRead(MarkMessageReadRequest) returns (MarkMessageReadResponse);
  
  // 批量标记已读（批量标记多条消息为已读，支持范围操作）
  rpc BatchMarkMessageRead(BatchMarkMessageReadRequest) returns (BatchMarkMessageReadResponse);
  
  // 范围标记已读（标记到指定消息为止的所有消息为已读）
  rpc MarkMessagesReadUntil(MarkMessagesReadUntilRequest) returns (MarkMessagesReadUntilResponse);
  
  // 标记会话已读（标记指定会话的所有未读消息为已读）
  rpc MarkConversationRead(MarkConversationReadRequest) returns (MarkConversationReadResponse);
  
  // 标记全部会话已读（标记用户在所有会话中的所有未读消息为已读）
  rpc MarkAllConversationsRead(MarkAllConversationsReadRequest) returns (MarkAllConversationsReadResponse);
  
  // 添加表情反应（添加表情反应到消息，支持多用户反应）
  rpc AddReaction(AddReactionRequest) returns (AddReactionResponse);
  
  // 移除表情反应（移除消息上的表情反应）
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse);
  
  // 置顶消息（置顶消息到会话顶部，支持设置到期时间）
  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse);
  
  // 取消置顶（取消消息的置顶状态）
  rpc UnpinMessage(UnpinMessageRequest) returns (UnpinMessageResponse);
  
  // 标记消息（标记消息为重要/待办等，支持自定义标记）
  rpc MarkMessage(MarkMessageRequest) returns (MarkMessageResponse);
  
  // 取消标记（取消消息的标记，支持取消特定类型或所有标记）
  rpc UnmarkMessage(UnmarkMessageRequest) returns (UnmarkMessageResponse);
  
  // ============================================================================
  // 3. 查询相关（Query）
  // ============================================================================
  
  // 查询会话消息（根据会话ID、时间范围等条件查询消息列表，支持分页和游标）
  rpc QueryMessages(QueryMessagesRequest) returns (QueryMessagesResponse);
  
  // 搜索消息（支持复杂的过滤条件、排序规则和时间范围搜索，支持全文搜索）
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);
  
  // 获取单条消息（根据消息ID获取完整的消息详情）
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);
  
  // 获取置顶消息列表（获取会话中的置顶消息列表）
  rpc GetPinnedMessages(GetPinnedMessagesRequest) returns (GetPinnedMessagesResponse);
  
  // 获取标记消息列表（获取用户的标记消息列表，支持按标记类型筛选）
  rpc GetMarkedMessages(GetMarkedMessagesRequest) returns (GetMarkedMessagesResponse);
  
  // 获取话题列表（获取会话中的所有话题列表）
  rpc GetThreads(GetThreadsRequest) returns (GetThreadsResponse);
  
  // 获取话题回复列表（获取话题中的所有回复消息）
  rpc GetThreadReplies(GetThreadRepliesRequest) returns (GetThreadRepliesResponse);
  
}

// 编辑消息请求（与 MessageEditEvent 对齐；operator_id 由 metadata 注入）
message EditMessageRequest {
  string message_id = 1;
  flare.common.v1.MessageContent new_content = 2;
  int32 edit_version = 3;
  string reason = 4;
  bool show_edited_mark = 5;
  string conversation_id = 6;  // 可选；当服务端未配置 StorageReader 时由客户端提供，用于解析会话
}

// 编辑消息响应
message EditMessageResponse {
  // 是否编辑成功
  // true: 编辑成功，消息内容已更新
  // false: 编辑失败，查看error_message获取失败原因
  bool success = 1;
  
  // 错误消息
  // 编辑失败时的错误描述，成功时为空
  string error_message = 2;
  
  // 编辑后的消息ID（与请求中的message_id相同）
  string message_id = 3;
  
  // 编辑版本号（更新后的版本号）
  int32 edit_version = 4;
  
  // 编辑时间
  // 消息被编辑的时间戳，格式：RFC3339格式
  google.protobuf.Timestamp edited_at = 5;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 6;
}

// 添加表情反应请求（与 ReactionEvent 对齐；user_id 由 metadata 注入）
message AddReactionRequest {
  string message_id = 1;
  string emoji = 2;
}

// 添加表情反应响应
message AddReactionResponse {
  bool success = 1;
  string error_message = 2;
  int32 new_count = 3;
  flare.common.v1.RpcStatus status = 4;
}

// 移除表情反应请求（user_id 由 metadata 注入）
message RemoveReactionRequest {
  string message_id = 1;
  string emoji = 2;
}

// 移除表情反应响应
message RemoveReactionResponse {
  bool success = 1;
  string error_message = 2;
  int32 new_count = 3;
  flare.common.v1.RpcStatus status = 4;
}

// -----------------------------------------------------------------------------
// 回复/引用消息说明
// -----------------------------------------------------------------------------
// 回复消息和引用消息现在统一通过 Message.quote 字段处理：
// 1. 客户端创建新消息，设置 Message.quote.quoted_message_id（必需）
// 2. 可选：设置 Message.quote.quoted_sender_id、quoted_text_preview 等
// 3. 客户端调用 SendMessage 发送消息
// 4. 服务端只负责存储和分发消息
//
// 示例（回复消息）：
//   message.quote.quoted_message_id = "msg_123"
//   message.quote.quoted_sender_id = "user_456"
//   message.quote.quoted_text_preview = "原消息预览"
//   SendMessage(conversation_id, message)
//
// -----------------------------------------------------------------------------
// 转发说明
// -----------------------------------------------------------------------------
// 转发由客户端完成，不需要专门的服务端接口：
// 1. 客户端获取要转发的消息内容
// 2. 客户端创建新消息，使用 ForwardContent 作为消息内容
// 3. 客户端调用 SendMessage 发送到目标会话
// 4. 服务端只负责存储和分发转发后的消息
//
// 示例：
//   message.content.forward.message_ids = ["msg1", "msg2"]
//   message.content.forward.forward_reason = "重要信息"
//   SendMessage(target_conversation_id, message)
//
// -----------------------------------------------------------------------------
// 话题回复说明
// -----------------------------------------------------------------------------
// 话题回复由客户端完成，不需要专门的服务端接口：
// 1. 客户端创建新消息，设置 attributes["thread_id"] = thread_id
// 2. 客户端调用 SendMessage 发送消息
// 3. 服务端只负责存储和分发消息
//
// 示例：
//   message.attributes["thread_id"] = "thread_123"
//   SendMessage(conversation_id, message)
//
// 话题根消息：
//   message.message_type = MESSAGE_TYPE_THREAD
//   message.content.thread.thread_id = "thread_123"
//   message.content.thread.thread_title = "话题标题"
//   message.content.thread.root_content = {...}

// -----------------------------------------------------------------------------
// 置顶消息相关
// -----------------------------------------------------------------------------

// 置顶消息请求（与 PinEvent 对齐；operator_id 由 metadata 注入）
message PinMessageRequest {
  string message_id = 1;
  string reason = 2;
  google.protobuf.Timestamp expire_at = 3;
}

// 置顶消息响应
message PinMessageResponse {
  // 是否置顶成功
  bool success = 1;
  
  // 错误消息
  string error_message = 2;
  
  // 置顶时间
  google.protobuf.Timestamp pinned_at = 3;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 4;
}

// 取消置顶请求（与 UnpinEvent 对齐；operator_id 由 metadata 注入）
message UnpinMessageRequest {
  string message_id = 1;
}

// 取消置顶响应
message UnpinMessageResponse {
  // 是否取消成功
  bool success = 1;
  
  // 错误消息
  string error_message = 2;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 3;
}


// -----------------------------------------------------------------------------
// 标记消息相关
// -----------------------------------------------------------------------------

// 标记消息请求（与 MarkEvent 对齐；user_id 由 metadata 注入）
message MarkMessageRequest {
  string message_id = 1;
  flare.common.v1.MarkType mark_type = 2;
  string color = 3;
}

// 标记消息响应
message MarkMessageResponse {
  // 是否标记成功
  bool success = 1;
  
  // 错误消息
  string error_message = 2;
  
  // 标记时间
  google.protobuf.Timestamp marked_at = 3;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 4;
}

// 取消标记请求（与 UnmarkEvent 对齐；user_id 由 metadata 注入）
message UnmarkMessageRequest {
  string message_id = 1;
  flare.common.v1.MarkType mark_type = 2;  // 空表示取消该消息全部标记
}

// 取消标记响应
message UnmarkMessageResponse {
  // 是否取消成功
  bool success = 1;
  
  // 错误消息
  string error_message = 2;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 3;
}

// -----------------------------------------------------------------------------
// 批量已读相关
// -----------------------------------------------------------------------------

// 批量标记已读请求（user_id 由 metadata 注入）
message BatchMarkMessageReadRequest {
  string conversation_id = 1;
  repeated string message_ids = 2;  // 空则标记会话内全部未读
  google.protobuf.Timestamp read_at = 3;
  bool burn_after_read = 4;
}

// 范围标记已读请求（user_id 由 metadata 注入）
message MarkMessagesReadUntilRequest {
  string conversation_id = 1;
  string until_message_id = 2;
  google.protobuf.Timestamp read_at = 3;
  bool burn_after_read = 4;
}

// 范围标记已读响应
message MarkMessagesReadUntilResponse {
  // 是否标记成功
  bool success = 1;
  
  // 错误消息
  string error_message = 2;
  
  // 已读的消息数量
  int32 read_count = 3;
  
  // 已读时间
  google.protobuf.Timestamp read_at = 4;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 5;
}

// 批量标记已读响应
message BatchMarkMessageReadResponse {
  // 是否标记成功
  bool success = 1;
  
  // 错误消息
  string error_message = 2;
  
  // 已读的消息数量
  int32 read_count = 3;
  
  // 已读时间
  google.protobuf.Timestamp read_at = 4;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 5;
}

// 标记会话已读请求（user_id 由 metadata 注入）
message MarkConversationReadRequest {
  string conversation_id = 1;
  google.protobuf.Timestamp read_at = 2;
  bool burn_after_read = 3;
}

// 标记会话已读响应
message MarkConversationReadResponse {
  // 是否标记成功
  // true: 标记成功，会话中所有未读消息已标记为已读
  // false: 标记失败，查看error_message获取失败原因
  bool success = 1;
  
  // 错误消息
  // 标记失败时的错误描述，成功时为空
  string error_message = 2;
  
  // 已读的消息数量
  // 本次标记为已读的消息数量
  int32 read_count = 3;
  
  // 已读时间
  // 消息被标记为已读的时间戳
  google.protobuf.Timestamp read_at = 4;
  
  // 会话的最后一条已读消息ID（可选）
  // 用于客户端更新会话的已读位置
  string last_read_message_id = 5;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 6;
}

// 标记全部会话已读请求（user_id 由 metadata 注入）
message MarkAllConversationsReadRequest {
  google.protobuf.Timestamp read_at = 1;
  bool burn_after_read = 2;
  repeated string conversation_types = 3;  // 空表示全部类型
}

// 标记全部会话已读响应
message MarkAllConversationsReadResponse {
  // 是否标记成功
  // true: 标记成功，所有会话中的未读消息已标记为已读
  // false: 标记失败，查看error_message获取失败原因
  bool success = 1;
  
  // 错误消息
  // 标记失败时的错误描述，成功时为空
  string error_message = 2;
  
  // 已读的会话数量
  // 本次标记为已读的会话数量
  int32 conversation_count = 3;
  
  // 已读的消息总数
  // 所有会话中本次标记为已读的消息总数
  int32 total_read_count = 4;
  
  // 已读时间
  // 消息被标记为已读的时间戳
  google.protobuf.Timestamp read_at = 5;
  
  // 各会话的已读统计信息（可选）
  // 包含每个会话的已读消息数量
  repeated ConversationReadStat conversation_stats = 6;
  
  // RPC状态，包含错误码和错误信息
  flare.common.v1.RpcStatus status = 7;
}

// 会话已读统计信息
message ConversationReadStat {
  // 会话ID
  string conversation_id = 1;
  
  // 已读的消息数量
  int32 read_count = 2;
  
  // 最后一条已读消息ID
  string last_read_message_id = 3;
}

// -----------------------------------------------------------------------------
// 置顶消息查询相关
// -----------------------------------------------------------------------------

// 获取置顶消息列表请求
message GetPinnedMessagesRequest {
  // 会话ID，要查询的会话
  string conversation_id = 1;
  
  // 分页信息（可选）
  flare.common.v1.Pagination pagination = 2;
}

// 获取置顶消息列表响应
message GetPinnedMessagesResponse {
  // 置顶消息列表
  repeated flare.common.v1.Message messages = 1;
  
  // 置顶信息列表
  repeated flare.common.v1.PinnedMessageInfo pinned_infos = 2;
  
  // 分页信息
  flare.common.v1.Pagination pagination = 3;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 4;
}


// -----------------------------------------------------------------------------
// 标记消息查询相关
// -----------------------------------------------------------------------------

// 获取标记消息列表请求（user_id 由 metadata 注入）
message GetMarkedMessagesRequest {
  flare.common.v1.MarkType mark_type = 1;
  flare.common.v1.Pagination pagination = 2;
}

// 获取标记消息列表响应
message GetMarkedMessagesResponse {
  // 标记消息列表
  repeated flare.common.v1.Message messages = 1;
  
  // 标记信息列表
  repeated flare.common.v1.MarkedMessageInfo marked_infos = 2;
  
  // 分页信息
  flare.common.v1.Pagination pagination = 3;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 4;
}

// -----------------------------------------------------------------------------
// 话题查询相关
// -----------------------------------------------------------------------------

// 获取话题列表请求
message GetThreadsRequest {
  string conversation_id = 1;
  flare.common.v1.ThreadStatus status = 2;
  
  // 分页信息（可选）
  flare.common.v1.Pagination pagination = 3;
}

// 获取话题列表响应
message GetThreadsResponse {
  // 话题列表（聚合视图）
  repeated flare.common.v1.ThreadInfo threads = 1;
  
  // 分页信息
  flare.common.v1.Pagination pagination = 2;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 3;
}

// 获取话题回复列表请求
message GetThreadRepliesRequest {
  string thread_id = 1;
  
  // 分页信息（可选）
  flare.common.v1.Pagination pagination = 2;
}

// 获取话题回复列表响应
message GetThreadRepliesResponse {
  // 回复消息列表（包含话题根消息和所有回复）
  repeated flare.common.v1.Message messages = 1;
  
  // 话题信息（聚合视图）
  flare.common.v1.ThreadInfo thread_info = 2;
  
  // 分页信息
  flare.common.v1.Pagination pagination = 3;
  
  // RPC状态
  flare.common.v1.RpcStatus status = 4;
}

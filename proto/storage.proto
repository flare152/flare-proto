syntax = "proto3";

package flare.storage.v1;

import "common/errors.proto";
import "common/event.proto";
import "common/metadata.proto";
import "common/message.proto";
import "common/message_content.proto";
import "common/enums.proto";
import "google/protobuf/timestamp.proto";

// 消息存储服务（读写分离）。约定：tenant_id、request_id 由 metadata 注入（见 common/metadata.proto）。

// -----------------------------------------------------------------------------
// 枚举定义
// -----------------------------------------------------------------------------

enum ClearType {
  CLEAR_ALL = 0;
  CLEAR_BEFORE_MESSAGE = 1;
  CLEAR_BEFORE_TIME = 2;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;      // 文本消息
  MESSAGE_TYPE_BINARY = 2;    // 二进制消息
  MESSAGE_TYPE_CUSTOM = 3;    // 自定义消息
}

enum VisibilityStatus {
  VISIBLE = 0;   // 可见
  HIDDEN = 1;     // 隐藏（软删除）
  DELETED = 2;    // 已删除（永久删除）
}

// -----------------------------------------------------------------------------
// 数据模型
// -----------------------------------------------------------------------------
// 注意：Message 定义已迁移到 common/message.proto
// 所有服务统一使用 flare.common.v1.Message
// 保留以下枚举和辅助消息用于向后兼容

// 失败的消息详情
message FailedMessage {
  string message_id = 1;
  flare.common.v1.ErrorCode code = 2;
  string error_message = 3;
}

// -----------------------------------------------------------------------------
// 写入相关消息（仅供内部Kafka消息队列使用）
// -----------------------------------------------------------------------------

// 消息写入命令（仅供内部Kafka消息队列使用，不通过gRPC直接调用）
message StoreMessage {
  string conversation_id = 1;
  flare.common.v1.Message message = 2;  // 使用 common 中的统一 Message 定义
  bool sync = 3;
  map<string, string> tags = 4;
  map<string, string> metadata = 5;  // 扩展元数据
}

// 批量消息写入命令
message BatchStoreMessage {
  repeated StoreMessage messages = 1;
  map<string, string> metadata = 2;  // 扩展元数据
}

// 消息写入结果（内部使用）
message StoreMessageResult {
  bool success = 1;
  string message_id = 2;
  string error_message = 3;
  flare.common.v1.RpcStatus status = 4;
}

// -----------------------------------------------------------------------------
// 查询相关消息
// -----------------------------------------------------------------------------

message QueryMessagesRequest {
  string conversation_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
  int32 limit = 4;
  string cursor = 5;
  flare.common.v1.Pagination pagination = 6;
}

message QueryMessagesResponse {
  repeated flare.common.v1.Message messages = 1;  // 使用 common 中的统一 Message 定义
  string next_cursor = 2;
  bool has_more = 3;
  flare.common.v1.Pagination pagination = 4;
  flare.common.v1.RpcStatus status = 5;
}

// 基于 seq 的消息查询请求
message QueryMessagesBySeqRequest {
  string conversation_id = 1;
  int64 after_seq = 2;        // 起始 seq（不包含）
  int64 before_seq = 3;       // 结束 seq（可选，0 表示不限制）
  int32 limit = 4;            // 返回消息数量限制
  string user_id = 5;         // 用户ID（可选，用于过滤已删除消息）
}

// 基于 seq 的消息查询响应
message QueryMessagesBySeqResponse {
  repeated flare.common.v1.Message messages = 1;  // 使用 common 中的统一 Message 定义
  string next_cursor = 2;     // 基于 seq 的游标（格式：seq:{seq}:{message_id}）
  bool has_more = 3;
  int64 last_seq = 4;         // 最后一条消息的 seq
  flare.common.v1.RpcStatus status = 5;
}

message SearchMessagesRequest {
  repeated flare.common.v1.FilterExpression filters = 3;
  repeated flare.common.v1.SortExpression sort = 4;
  flare.common.v1.Pagination pagination = 5;
  flare.common.v1.TimeRange time_range = 6;
}

message SearchMessagesResponse {
  repeated flare.common.v1.Message messages = 1;  // 使用 common 中的统一 Message 定义
  flare.common.v1.Pagination pagination = 2;
  flare.common.v1.RpcStatus status = 3;
}

message GetMessageRequest {
  string message_id = 3;
}

message GetMessageResponse {
  flare.common.v1.Message message = 1;  // 使用 common 中的统一 Message 定义
  flare.common.v1.RpcStatus status = 2;
}

// -----------------------------------------------------------------------------
// 消息事件查询（按事件类型、编辑历史、已读、标记、反应等独立查询）
// -----------------------------------------------------------------------------
// 以下为业务专用读模型，与 Event 解耦，便于前端直接展示。

// 编辑历史单条：某次编辑的版本、内容、操作人、时间等
message MessageEditHistoryEntry {
  int32 edit_version = 1;                           // 从 1 递增
  flare.common.v1.MessageContent content = 2;       // 该版本内容
  google.protobuf.Timestamp edited_at = 3;
  string editor_id = 4;
  string reason = 5;
  bool show_edited_mark = 6;                        // 是否显示「已编辑」
}

// 已读列表单条：谁在何时读了该消息
message MessageReadListEntry {
  string user_id = 1;
  google.protobuf.Timestamp read_at = 2;
  google.protobuf.Timestamp burned_at = 3;          // 阅后即焚销毁时间，无则空
}

// 标记单条：某用户对该消息的标记（重要/待办/已处理等）
message MessageMarkEntry {
  string user_id = 1;
  flare.common.v1.MarkType mark_type = 2;
  string color = 3;                                 // 可选
  google.protobuf.Timestamp marked_at = 4;
}

// 反应单条：按 emoji 聚合，含该 emoji 的用户列表与数量
message MessageReactionItem {
  string emoji = 1;                                 // 如 👍、❤️
  repeated string user_ids = 2;
  int32 count = 3;                                  // 冗余，等于 user_ids 长度
  google.protobuf.Timestamp last_updated = 4;
}

// 按事件类型查询消息相关事件（支持按类型过滤）
message QueryMessageEventsRequest {
  string message_id = 1;                              // 消息ID
  repeated flare.common.v1.EventType event_types = 2; // 事件类型过滤，空表示全部类型
  flare.common.v1.Pagination pagination = 3;
}

message QueryMessageEventsResponse {
  repeated flare.common.v1.Event events = 1;
  flare.common.v1.Pagination pagination = 2;
  flare.common.v1.RpcStatus status = 3;
}

// 查询消息编辑历史
message QueryMessageEditHistoryRequest {
  string message_id = 1;
  flare.common.v1.Pagination pagination = 2;
}

message QueryMessageEditHistoryResponse {
  repeated MessageEditHistoryEntry edit_history = 1;
  flare.common.v1.Pagination pagination = 2;
  flare.common.v1.RpcStatus status = 3;
}

// 查询消息已读列表（谁在何时读了该消息）
message QueryMessageReadListRequest {
  string message_id = 1;
  flare.common.v1.Pagination pagination = 2;
}

message QueryMessageReadListResponse {
  repeated MessageReadListEntry read_list = 1;
  flare.common.v1.Pagination pagination = 2;
  flare.common.v1.RpcStatus status = 3;
}

// 查询消息标记（重要/待办/已处理等）
message QueryMessageMarksRequest {
  string message_id = 1;
  flare.common.v1.Pagination pagination = 2;
}

message QueryMessageMarksResponse {
  repeated MessageMarkEntry marks = 1;
  flare.common.v1.Pagination pagination = 2;
  flare.common.v1.RpcStatus status = 3;
}

// 查询消息反应（表情回应）
message QueryMessageReactionsRequest {
  string message_id = 1;
  flare.common.v1.Pagination pagination = 2;
}

message QueryMessageReactionsResponse {
  repeated MessageReactionItem reactions = 1;
  flare.common.v1.Pagination pagination = 2;
  flare.common.v1.RpcStatus status = 3;
}

// -----------------------------------------------------------------------------
// 元数据操作相关消息（仅查询相关）
// -----------------------------------------------------------------------------

message ListMessageTagsRequest {
}

message ListMessageTagsResponse {
  repeated string tags = 1;
  flare.common.v1.RpcStatus status = 2;
}

message ExportMessagesRequest {
  string conversation_id = 3;
  flare.common.v1.TimeRange time_range = 4;
  repeated flare.common.v1.FilterExpression filters = 5;
}

message ExportMessagesResponse {
  string export_task_id = 1;
  flare.common.v1.RpcStatus status = 2;
}

// -----------------------------------------------------------------------------
// 服务定义
// -----------------------------------------------------------------------------

// 存储查询服务 - 由 flare-storage/reader 实现（内部服务）
// 
// 设计说明：
// - 本服务提供底层存储查询能力（内部使用，不直接对外暴露）
// - 所有查询操作通过 MessageService → StorageReaderService 链路处理
// - 支持高性能的 seq 查询、时间范围查询、标签查询等
service StorageReaderService {
  // 查询会话消息（支持时间范围和分页）
  rpc QueryMessages(QueryMessagesRequest) returns (QueryMessagesResponse);

  // 基于 seq 查询会话消息（支持 seq 范围和分页，性能更优）
  rpc QueryMessagesBySeq(QueryMessagesBySeqRequest) returns (QueryMessagesBySeqResponse);

  // 搜索消息（支持复杂过滤和排序）
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);

  // 获取单条消息
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);

  // 按事件类型查询消息相关事件（支持 event_types 过滤）
  rpc QueryMessageEvents(QueryMessageEventsRequest) returns (QueryMessageEventsResponse);
  // 查询消息编辑历史
  rpc QueryMessageEditHistory(QueryMessageEditHistoryRequest) returns (QueryMessageEditHistoryResponse);
  // 查询消息已读列表
  rpc QueryMessageReadList(QueryMessageReadListRequest) returns (QueryMessageReadListResponse);
  // 查询消息标记（重要/待办/已处理等）
  rpc QueryMessageMarks(QueryMessageMarksRequest) returns (QueryMessageMarksResponse);
  // 查询消息反应（表情回应）
  rpc QueryMessageReactions(QueryMessageReactionsRequest) returns (QueryMessageReactionsResponse);

  // 列出消息标签
  rpc ListMessageTags(ListMessageTagsRequest) returns (ListMessageTagsResponse);

  // 导出消息（异步导出，支持时间范围和过滤）
  rpc ExportMessages(ExportMessagesRequest) returns (ExportMessagesResponse);
}